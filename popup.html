<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 350px; padding: 10px; font-family: sans-serif; font-size: 13px; }
    h3 { margin-top: 0; }
    #fieldsList { max-height: 200px; overflow-y: auto; border: 1px solid #ccc; padding: 5px; margin-bottom: 10px; }
    .form-group { font-weight: bold; color: #444; border-bottom: 1px solid #eee; margin-top: 5px; }
    .field-item { padding-left: 10px; font-size: 11px; color: #666; }
    #jsonPreview { 
      background: #f4f4f4; padding: 5px; font-family: monospace; font-size: 10px; 
      white-space: pre-wrap; word-break: break-all; max-height: 100px; overflow-y: auto; 
      display: none; border: 1px dashed #999; margin-top: 10px;
    }
    button { cursor: pointer; padding: 5px 10px; }
    #status { font-weight: bold; font-size: 12px; margin: 5px 0; }
    .copy-block { border: 1px solid #a5d6a7; background: #e8f5e9; margin-bottom: 5px; border-radius: 4px; overflow: hidden; }
    .copy-header { display: flex; justify-content: space-between; background: #c8e6c9; padding: 3px 5px; font-weight: bold; font-size: 10px; align-items: center; }
    .copy-btn { font-size: 9px; padding: 2px 5px; background: white; border: 1px solid #81c784; border-radius: 3px; cursor: pointer; }
    .copy-val { padding: 5px; font-family: monospace; font-size: 11px; word-break: break-all; margin: 0; }
  </style>
</head>
<body>
  <h3>LLM Auto-Filler</h3>
  
  <button id="scanButton">Scan Page</button>
  <button id="capture-btn">Capture Context</button>
  <div id="status"></div>
  
  <div id="summary" style="margin-top:10px;"></div>
  
  <div style="margin: 10px 0;">
    <label for="formSelector">Target Form:</label>
    <select id="formSelector" style="width: 100%;" disabled>
      <option value="all">All Forms</option>
    </select>
  </div>

  <div id="fieldsList">No fields scanned yet.</div>
  
  <p id="status"></p>
  
  <button id="fillButton" disabled>Generate & Fill</button>
  
  <div style="margin-top:10px;">
    <a href="#" id="toggleJson" style="font-size: 11px;">Show Extracted Form Context (Send to LLM)</a>
    <div id="jsonPreview"></div>
  </div>

  <div style="margin-top:15px; border-top: 1px solid #ccc; padding-top: 10px;">
    <h4 style="margin: 0 0 5px 0; font-size: 12px;">LLM Generated Data (Result)</h4>
    <p style="font-size: 10px; color: #666; margin: 0 0 5px 0;">Use this to manually copy/paste if auto-fill fails.</p>
    <div id="llmOutput" style="max-height: 250px; overflow-y: auto;">No data generated yet.</div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
